<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lunascan YZ Analizi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background-color: black; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scale(1); transform-origin: center; transition: transform 0.1s; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;}
        
        .crosshair { position: absolute; top: 50%; left: 50%; width: 150px; height: 150px; border: 2px solid rgba(0, 255, 204, 0.5); transform: translate(-50%, -50%); border-radius: 50%; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(0, 255, 204, 0.8); }
        .crosshair::before { top: 50%; left: -30px; right: -30px; height: 2px; transform: translateY(-50%); }
        .crosshair::after { left: 50%; top: -30px; bottom: -30px; width: 2px; transform: translateX(-50%); }
        
        .hud-text { position: absolute; padding: 25px; font-size: 1.2rem; text-shadow: 0 0 5px #00ffcc; font-weight: bold;}
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; text-align: right; }
        .bottom-center { bottom: 30px; left: 50%; transform: translateX(-50%); pointer-events: auto; text-align: center; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; z-index: 20;}
        input[type=range] { width: 300px; cursor: pointer; accent-color: #00ffcc; }
        
        .scanning-line { position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 204, 0.5); top: 0; animation: scan 3s linear infinite; box-shadow: 0 0 10px #00ffcc;}
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="camera-feed" autoplay playsinline></video>
        <canvas id="analysis-canvas"></canvas>
        
        <div class="overlay">
            <div class="scanning-line"></div>
            <div class="crosshair"></div>
            <div class="hud-text top-left">LUNASCAN V40<br>SİSTEM: ÇEVRİMİÇİ<br>MOD: BİYOMETRİK TARAMA</div>
            <div class="hud-text top-right" id="status-text">YZ AĞINA BAĞLANILIYOR...<br>LÜTFEN BEKLEYİN</div>
        </div>

        <div class="hud-text bottom-center">
            <label for="zoomSlider">OPTIK YAKINLAŞTIRMA: <span id="zoomValue">1.0</span>x</label><br><br>
            <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1">
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('analysis-canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const slider = document.getElementById('zoomSlider');
        const zoomVal = document.getElementById('zoomValue');
        let zoomLevel = 1;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Kamerayı Başlat
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => { loadAI(); };
            })
            .catch(err => {
                statusText.innerHTML = "SENSÖR BAĞLANTI HATASI!";
            });

        // Yapay Zekayı Yükle
        async function loadAI() {
            statusText.innerHTML = "SİNİR AĞI YÜKLENİYOR...<br>VERİTABANI EŞLEŞTİRİLİYOR";
            const model = await cocoSsd.load(); // İnternetten yapay zeka modelini çeker
            statusText.innerHTML = "HEDEFLEME: AKTİF<br>CANLI ANALİZ: ÇALIŞIYOR";
            detectFrame(video, model);
        }

        // Çerçeveleri Tarama ve Çizim Döngüsü
        async function detectFrame(video, model) {
            const predictions = await model.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            predictions.forEach(prediction => {
                const videoRatio = video.videoWidth / video.videoHeight;
                const screenRatio = canvas.width / canvas.height;
                let drawWidth = canvas.width, drawHeight = canvas.height;
                let offsetX = 0, offsetY = 0;

                if (screenRatio > videoRatio) {
                    drawHeight = canvas.width / videoRatio;
                    offsetY = (canvas.height - drawHeight) / 2;
                } else {
                    drawWidth = canvas.height * videoRatio;
                    offsetX = (canvas.width - drawWidth) / 2;
                }

                // Kutu Koordinatları (Zoom hesaplaması ile birlikte)
                const x = offsetX + (prediction.bbox[0] / video.videoWidth) * drawWidth;
                const y = offsetY + (prediction.bbox[1] / video.videoHeight) * drawHeight;
                const width = (prediction.bbox[2] / video.videoWidth) * drawWidth;
                const height = (prediction.bbox[3] / video.videoHeight) * drawHeight;

                const cx = canvas.width / 2; const cy = canvas.height / 2;
                const zx = cx + (x - cx) * zoomLevel;
                const zy = cy + (y - cy) * zoomLevel;
                const zw = width * zoomLevel;
                const zh = height * zoomLevel;

                // Hedefleme Kutusu Çizimi
                ctx.beginPath();
                ctx.rect(zx, zy, zw, zh);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#00ffcc';
                ctx.fillStyle = 'rgba(0, 255, 204, 0.1)';
                ctx.fill();
                ctx.stroke();

                // Kutu Köşelikleri (Askeri Optik Görünümü)
                const lineLen = 15;
                ctx.beginPath();
                // Sol üst
                ctx.moveTo(zx, zy + lineLen); ctx.lineTo(zx, zy); ctx.lineTo(zx + lineLen, zy);
                // Sağ üst
                ctx.moveTo(zx + zw - lineLen, zy); ctx.lineTo(zx + zw, zy); ctx.lineTo(zx + zw, zy + lineLen);
                // Sol alt
                ctx.moveTo(zx, zy + zh - lineLen); ctx.lineTo(zx, zy + zh); ctx.lineTo(zx + lineLen, zy + zh);
                // Sağ alt
                ctx.moveTo(zx + zw - lineLen, zy + zh); ctx.lineTo(zx + zw, zy + zh); ctx.lineTo(zx + zw, zy + zh - lineLen);
                ctx.lineWidth = 3; ctx.strokeStyle = '#fff'; ctx.stroke();

                // Veri Etiketi (Nesne Adı ve Güven Yüzdesi)
                ctx.fillStyle = '#00ffcc';
                ctx.font = 'bold 16px Courier New';
                const text = prediction.class.toUpperCase() + " [" + Math.round(prediction.score * 100) + "%]";
                
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(zx, zy - 25, ctx.measureText(text).width + 10, 25);
                ctx.fillStyle = '#00ffcc';
                ctx.fillText(text, zx + 5, zy - 7);
            });

            requestAnimationFrame(() => { detectFrame(video, model); });
        }

        slider.addEventListener('input', function() {
            zoomLevel = this.value;
            video.style.transform = `scale(${zoomLevel})`;
            zoomVal.innerText = parseFloat(zoomLevel).toFixed(1);
        });
    </script>
</body>
</html>
